name: shared_ui
description: Shared design system — AppTheme, CustomToast, and page transitions used by both passenger_app and driver_app.
version: 0.1.0
publish_to: none

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.0
  shared_preferences: ^2.3.5
  flutter_lucide: ^1.8.2
  cached_network_image: ^3.4.1
  go_router_modular: ^5.0.5
  go_transitions: ^0.8.3

flutter:
  assets:
    - assets/images/
    - assets/icons/
    - assets/logo/

  fonts:
    - family: ProductSans
      fonts:
        - asset: assets/fonts/Product_Sans_Bold_Italic.ttf
          weight: 700
          style: italic
        - asset: assets/fonts/Product_Sans_Italic.ttf
          weight: 400
          style: italic
        - asset: assets/fonts/Product_Sans_Bold.ttf
          weight: 700
          style: normal
        - asset: assets/fonts/Product_Sans_Regular.ttf
          weight: 400
          style: normal
