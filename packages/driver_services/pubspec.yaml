name: driver_services
description: Shared driver API services and background telemetry services.
version: 0.1.0
publish_to: none

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  dio: ^5.10.0
  fpdart: ^1.2.0
  freezed_annotation: ^3.0.0
  json_annotation: ^4.12.0
  flutter_background_service: ^5.1.0
  core_models:
    path: ../core_models
  session_service:
    path: ../session_service

dev_dependencies:
  build_runner: ^2.4.15
  freezed: ^3.0.0
  json_serializable: ^6.9.4
