name: fare_services
description: Fare calculation, estimation, backend quote parsing, currency formatting, and Cash-on-Hand payment management.
version: 0.1.0
publish_to: none

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  equatable: ^2.0.7
  fpdart: ^1.2.0
  dio: ^5.10.0
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0
  core_models:
    path: ../core_models
  session_service:
    path: ../session_service

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.15
  freezed: ^3.0.0
  json_serializable: ^6.9.4
