version: '3.8'

services:
  passenger-db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  auth-service:
    build:
      context: .
      dockerfile: server/auth-service/Dockerfile
    restart: always
    ports:
      - "8088:8088"
    environment:
      PORT: 8088
      JWT_SECRET: ${JWT_SECRET}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}

  passenger-service:
    build:
      context: .
      dockerfile: server/passenger-service/Dockerfile
    restart: always
    ports:
      - "8081:8081"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      PORT: 8081
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
    depends_on:
      - passenger-db

  api-gateway:
    build:
      context: .
      dockerfile: server/api-gateway/Dockerfile
    restart: always
    ports:
      - "8080:8080"
    environment:
      AUTH_SERVICE_URL: http://auth-service:8088
      PASSENGER_SERVICE_URL: http://passenger-service:8081
      DRIVER_SERVICE_URL: http://driver-service:8082
      TRIP_SERVICE_URL: http://trip-service:8083
      TELEMETRY_SERVICE_URL: http://telemetry-service:8084
      BIDDING_SERVICE_URL: http://bidding-service:8085
      CHAT_SERVICE_URL: http://chat-service:8086
      FARE_SERVICE_URL: http://fare-service:8087
    depends_on:
      - auth-service
      - passenger-service

  driver-service:
    build:
      context: .
      dockerfile: server/driver-service/Dockerfile
    restart: always
    ports:
      - "8082:8082"

  trip-service:
    build:
      context: .
      dockerfile: server/trip-service/Dockerfile
    restart: always
    ports:
      - "8083:8083"

  bidding-service:
    build:
      context: .
      dockerfile: server/bidding-service/Dockerfile
    restart: always
    ports:
      - "8084:8084"

  telemetry-service:
    build:
      context: .
      dockerfile: server/telemetry-service/Dockerfile
    restart: always
    ports:
      - "8085:8085"

  chat-service:
    build:
      context: .
      dockerfile: server/chat-service/Dockerfile
    restart: always
    ports:
      - "8086:8086"
    environment:
      DATABASE_URL: postgresql://driveapp:securepassword123@passenger-db:5432/chat_db
      PORT: 8086
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      - passenger-db

  fare-service:
    build:
      context: .
      dockerfile: server/fare-service/Dockerfile
    restart: always
    ports:
      - "8087:8087"

volumes:
  postgres_data:
