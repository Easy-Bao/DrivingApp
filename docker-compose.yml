version: '3.8'

services:
  passenger-db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  passenger-service:
    build:
      context: .
      dockerfile: server/passenger-service/Dockerfile
    restart: always
    ports:
      - "8081:8081"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      PORT: 8081
    depends_on:
      - passenger-db

volumes:
  postgres_data:
