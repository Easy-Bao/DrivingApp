name: BaoRide Code Quality & Verification

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  verify:
    name: Code Analysis & Verification
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Root Dependencies
        run: flutter pub get

      - name: Install Melos Global Executable
        run: |
          dart pub global activate melos
          echo "$HOME/.pub-cache/bin" >> $GITHUB_PATH

      - name: Bootstrap Monorepo Workspace
        run: flutter pub global run melos bootstrap

      - name: Run Static Analysis & Verification
        run: flutter pub global run melos exec -- "flutter analyze . --no-fatal-warnings --no-fatal-infos"
